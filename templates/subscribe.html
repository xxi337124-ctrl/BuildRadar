<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>订阅 {{ site.title }}</title>
  <link rel="icon" href="data:image/svg+xml,<svg xmlns=%22http://www.w3.org/2000/svg%22 viewBox=%220 0 64 64%22><rect width=%2264%22 height=%2264%22 rx=%2212%22 fill=%22%2358a6ff%22/><text x=%2250%25%22 y=%2256%22 text-anchor=%22middle%22 font-family=%22monospace%22 font-weight=%22700%22 font-size=%2234%22 fill=%22%230d1117%22>BR</text></svg>" />
  <style>
    :root{
      --bg:#0d1117;
      --panel:#161b22;
      --border:#30363d;
      --fg:#e6edf3;
      --muted:#8b949e;
      --accent:#58a6ff;
    }
    *{box-sizing:border-box;}
    html,body{margin:0;padding:0;background:var(--bg);color:var(--fg);font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",ui-sans-serif,sans-serif;line-height:1.7;}
    a{color:var(--accent);text-decoration:none;}
    a:hover{text-decoration:underline;}
    .container{max-width:640px;margin:0 auto;padding:64px 24px 96px;text-align:center;}
    h1{font-size:36px;margin:0 0 12px;letter-spacing:-0.5px;}
    .tagline{color:var(--muted);font-size:16px;margin:0 0 40px;}
    .features{text-align:left;margin:32px 0;display:grid;gap:16px;}
    .feature{background:var(--panel);border:1px solid var(--border);border-radius:10px;padding:20px 22px;}
    .feature h3{margin:0 0 6px;font-size:16px;}
    .feature p{margin:0;color:var(--muted);font-size:14px;}
    form.sub{margin-top:24px;display:flex;gap:8px;flex-wrap:wrap;justify-content:center;}
    form.sub input[type=email]{flex:1;min-width:220px;padding:12px 14px;border-radius:8px;border:1px solid var(--border);background:var(--panel);color:var(--fg);font-size:14px;}
    form.sub input[type=email]:focus{outline:none;border-color:var(--accent);}
    form.sub button{padding:12px 22px;border-radius:8px;border:none;background:var(--accent);color:#0d1117;font-weight:700;cursor:pointer;font-size:14px;}
    form.sub button:hover{opacity:0.9;}
    .back{display:inline-block;margin-top:36px;color:var(--muted);}
  </style>
</head>
<body>
  <div class="container">
    <h1>{{ site.title }}</h1>
    <p class="tagline">{{ site.tagline }}</p>

    <div class="features">
      <div class="feature">
        <h3>🕐 每天 5 分钟</h3>
        <p>一封简洁的邮件，3 大信号 + 1 个构建建议，省掉你刷 HN、GitHub、Reddit 的时间。</p>
      </div>
      <div class="feature">
        <h3>🎯 6 个平台交叉验证</h3>
        <p>Hacker News、GitHub Trending、Product Hunt、HuggingFace、Google Trends、Reddit。只有多平台同时出现的信号才会被标为"强信号"。</p>
      </div>
      <div class="feature">
        <h3>🛠 可执行的构建建议</h3>
        <p>不是新闻摘要，是给独立开发者的行动清单。做什么、为什么、怎么验证，一步到位。</p>
      </div>
    </div>

    <form class="sub" action="{{ site.newsletter_url }}/subscribe" method="post">
      <input type="email" name="email" placeholder="your@email.com" required />
      <button type="submit">免费订阅</button>
    </form>

    <a class="back" href="index.html">← 返回首页</a>
  </div>
</body>
</html>
