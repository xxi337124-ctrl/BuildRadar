# BuildRadar 配置（API keys 全部从环境变量读取，此文件只放非敏感配置）

collectors:
  hackernews:
    top_stories_count: 30          # 采集 top stories 数量
    min_points: 50                 # 最低分数过滤
    min_comments: 10               # 最低评论数过滤
    show_hn_count: 20
    ask_hn_count: 10
  github:
    languages: ["", "python", "typescript", "rust"]  # "" 表示 all languages
    since: "daily"                 # daily / weekly
    request_interval_seconds: 2
  producthunt:
    posts_count: 20                # 采集当天产品数量
  huggingface:
    top_count: 20                  # 采集 trending models 数量
  google_trends:
    # 每天动态生成关键词列表：从其他 5 个源提取高频词 + 固定观察词
    fixed_keywords:
      - "AI agent"
      - "self-hosted"
      - "Claude Code"
      - "open source"
      - "vibe coding"
    max_trending_keywords: 10      # 从其他源自动提取的关键词上限
  reddit:
    subreddits: ["SaaS", "SideProject", "indiehackers", "selfhosted", "programming"]
    posts_per_subreddit: 10
    min_score: 20
    request_interval_seconds: 3

analyzer:
  model: "claude-sonnet-4-20250514"
  max_tokens: 6000
  max_input_chars: 30000           # 喂给 Claude 的 raw_data 字符上限

site:
  title: "BuildRadar"
  tagline: "每天 5 分钟，知道该构建什么"
  base_url: "https://yourusername.github.io/buildradar"
  newsletter_url: "https://buttondown.com/buildradar"
  github_url: "https://github.com/yourusername/buildradar"
